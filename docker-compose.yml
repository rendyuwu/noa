services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: noa
      POSTGRES_PASSWORD: noa
      POSTGRES_DB: noa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noa -d noa"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - noa_pgdata:/var/lib/postgresql/data

volumes:
  noa_pgdata:
