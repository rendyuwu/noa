services:
  postgres:
    image: ${NOA_POSTGRES_IMAGE:-postgres:16}
    environment:
      POSTGRES_USER: ${NOA_POSTGRES_USER:-noa}
      POSTGRES_PASSWORD: ${NOA_POSTGRES_PASSWORD:-noa}
      POSTGRES_DB: ${NOA_POSTGRES_DB:-noa}
    ports:
      - "${NOA_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - ${NOA_POSTGRES_VOLUME:-noa_pgdata}:/var/lib/postgresql/data

volumes:
  noa_pgdata:
